name: Test

on:
  push:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - requirements/ci.constraints.txt
      - .github/workflows/test.yaml
  pull_request:
    branches: [main]
    paths:
      - src/**
      - tests/**
      - pyproject.toml
      - requirements/ci.constraints.txt
      - .github/workflows/test.yaml
  workflow_dispatch: {}
  schedule:
    - cron: "40 12 * * 1-5"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}

env:
  FORCE_COLOR: "1"

permissions: {}

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: hynek/build-and-inspect-python-package@efb823f52190ad02594531168b7a2d5790e66516 # v2.14.0
        id: baipp

  typing:
    name: Typing
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          python-version: "3.14"
      - name: Install tools
        env:
          UV_CONSTRAINT: ${{ github.workspace }}/requirements/ci.constraints.txt
        run: |
          uv tool install --with tox-uv tox
      - name: Run typing
        run: |
          tox -e typing

  test:
    name: Pytest
    needs: build-package
    runs-on: ${{ matrix.os }}
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}
        os: ["ubuntu-24.04"]
        include:
          - python-version: "3.14"
            os: "windows-2025"
          - python-version: "3.14"
            os: "macos-15"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        env:
          UV_CONSTRAINT: ${{ github.workspace }}/requirements/ci.constraints.txt
        run: |
          uv tool install --with tox-uv tox
      - name: Run tests
        shell: sh
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          tox -e ${PYTHON_VERSION}
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          include-hidden-files: true
          name: coverage-data-${{ matrix.os }}-${{ matrix.python-version }}
          path: ".coverage.*"
      - name: Run doctests
        run: |
          tox -e doctest

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@61cb8a9741eeb8a550a1b8544337180c0fc8476b # v7.2.0
      - name: Install tools
        env:
          UV_CONSTRAINT: ${{ github.workspace }}/requirements/ci.constraints.txt
        run: |
          uv tool install --with tox-uv tox
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - name: Create coverage XML report
        run: |
          tox -e coverage
      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
